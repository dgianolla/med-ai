name: Deploy to EasyPanel

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel deploy
        run: curl -s -X GET "${{ secrets.EASYPANEL_BACKEND_WEBHOOK }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel deploy
        run: curl -s -X GET "${{ secrets.EASYPANEL_FRONTEND_WEBHOOK }}"
