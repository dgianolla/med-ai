services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: "http://agente-ia_backend:8000"
    ports:
      - "3001:3000"
    environment:
      BACKEND_INTERNAL_URL: "http://agente-ia_backend:8000"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend
    command: node server.js
